name: Security CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: secret-scan — scans repo & history for hardcoded credentials
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # STAGE 2: SAST — static analysis (Bandit + Semgrep). CodeQL runs in parallel
  # in a separate workflow if enabled in repo Security settings.
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit semgrep
      - name: Bandit (high severity, high confidence)
        run: bandit -r . -lll -iii -x ./test_app.py
      - name: Semgrep (auto config, errors block)
        run: semgrep scan --config=p/python --error --severity=ERROR --metrics=off

  # ---------------------------------------------------------------------------
  # STAGE 3: test — unit tests
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [sast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r requirements.txt
          pip install pytest
      - run: pytest test_app.py -v

  # ---------------------------------------------------------------------------
  # STAGE 4: build — build & push Docker image to GHCR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [unit-test, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  # ---------------------------------------------------------------------------
  # STAGE 5a: SBOM generation (CycloneDX)
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (Syft / CycloneDX)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  # ---------------------------------------------------------------------------
  # STAGE 5b: SCA — dependency scanning (OSV-Scanner against requirements.txt)
  # ---------------------------------------------------------------------------
  dependency-scanning:
    name: SCA (OSV-Scanner)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install OSV-Scanner
        run: |
          curl -sSL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v1.9.1/osv-scanner_linux_amd64
          chmod +x osv-scanner
      - name: Scan lockfiles
        run: ./osv-scanner --lockfile=requirements.txt:requirements.txt .

  # ---------------------------------------------------------------------------
  # STAGE 5c: Container scanning (Trivy, blocks on CRITICAL)
  # ---------------------------------------------------------------------------
  container-scanning:
    name: Container Scanning (Trivy)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-container

  # ---------------------------------------------------------------------------
  # STAGE 6 + 7: deploy (run image locally on the runner) + DAST scan
  # Combined into one job because each GitHub-hosted runner is an ephemeral VM,
  # so a service started in `deploy` would not be reachable from a separate
  # `dast` job — the network does not persist across jobs.
  # ---------------------------------------------------------------------------
  deploy-dast:
    name: Deploy (ephemeral) + DAST
    runs-on: ubuntu-latest
    needs: [container-scanning, dependency-scanning, sbom]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Pull and run image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.IMAGE }}
          docker run -d --name app -p 5000:5000 ${{ env.IMAGE }}
          for i in {1..30}; do
            curl -fsS http://localhost:5000/ && break || sleep 1
          done
          curl -fsS http://localhost:5000/ || (docker logs app && exit 1)
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: http://localhost:5000
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-I -a'
